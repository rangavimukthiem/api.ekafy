# ─────────────────────────────────────────────────────────────────────────────
# EKAFY Nginx Configuration
# Serves: api.ekafy.com, blog.ekafy.com, dashboard.ekafy.com
# Place this file at: /etc/nginx/sites-available/ekafy
# Enable with: ln -sf /etc/nginx/sites-available/ekafy /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

# ─── Upstream: Django Gunicorn ────────────────────────────────────────────────
upstream django_backend {
    server 127.0.0.1:8000 fail_timeout=5s;
    keepalive 32;
}

# ─── Rate limiting zone ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=dashboard_limit:5m rate=30r/m;

# ─── Redirect HTTP → HTTPS (enable after SSL) ─────────────────────────────────
# Uncomment the following block once certbot has issued certificates:
#
# server {
#     listen 80;
#     server_name api.ekafy.com blog.ekafy.com dashboard.ekafy.com;
#     return 301 https://$host$request_uri;
# }

# ─────────────────────────────────────────────────────────────────────────────
# 1. api.ekafy.com → Django REST API (Gunicorn on :8000)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;  # Enable after certbot
    server_name api.ekafy.com;

    # SSL certificates (uncomment after certbot)
    # ssl_certificate     /etc/letsencrypt/live/api.ekafy.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.ekafy.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-Frame-Options           "DENY"            always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 10M;

    # Django static files (collected via collectstatic)
    location /static/ {
        alias /srv/ekafy/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Django media files
    location /media/ {
        alias /srv/ekafy/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Nginx stub_status (admin monitoring only)
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }

    # API routing
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://django_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_buffering     on;
        proxy_buffer_size   8k;
        proxy_buffers       8 8k;
    }

    access_log  /var/log/nginx/api.ekafy.access.log;
    error_log   /var/log/nginx/api.ekafy.error.log warn;
}

# ─────────────────────────────────────────────────────────────────────────────
# 2. blog.ekafy.com → WordPress (PHP-FPM on /srv/ekafy/wordpress)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;
    server_name blog.ekafy.com;

    # ssl_certificate     /etc/letsencrypt/live/blog.ekafy.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/blog.ekafy.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    root /srv/ekafy/wordpress;
    index index.php index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 20M;

    # WordPress permalinks
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP-FPM handler
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 60;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        log_not_found off;
        access_log off;
    }

    # Block access to hidden files and sensitive WP paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* /wp-config\.php { deny all; }
    location ~* /xmlrpc\.php    { deny all; }

    access_log /var/log/nginx/blog.ekafy.access.log;
    error_log  /var/log/nginx/blog.ekafy.error.log warn;
}

# ─────────────────────────────────────────────────────────────────────────────
# 3. dashboard.ekafy.com → Django Admin Dashboard
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;
    server_name dashboard.ekafy.com;

    # ssl_certificate     /etc/letsencrypt/live/dashboard.ekafy.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dashboard.ekafy.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    # Extra restriction: allow only specific IP range (uncomment + customize)
    # allow 10.0.0.0/8;
    # allow YOUR.OFFICE.IP.HERE;
    # deny all;

    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-Frame-Options           "DENY"            always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10M;

    location /static/ {
        alias /srv/ekafy/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        limit_req zone=dashboard_limit burst=10 nodelay;

        proxy_pass http://django_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    access_log /var/log/nginx/dashboard.ekafy.access.log;
    error_log  /var/log/nginx/dashboard.ekafy.error.log warn;
}
